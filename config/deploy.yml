service: flightgo-backend
image: registry.yourdomain.com/flightgo/backend

servers:
  web:
    - YOUR_SERVER_IP

proxy:
  ssl: true
  host: api.flightgo.app

registry:
  server: registry.yourdomain.com
  username: <%= ENV["KAMAL_REGISTRY_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  dockerfile: apps/backend/Dockerfile
  context: apps/backend

env:
  clear:
    PORT: 3000
    NODE_ENV: production
    DATABASE_URL: postgresql://flightgo:<%= ENV["DB_PASSWORD"] %>@postgres:5432/flightgo_db
    REDIS_URL: redis://:redis_pass@redis:6379
  secret:
    - JWT_SECRET
    - JWT_REFRESH_SECRET
    - DB_PASSWORD
    - FLIGHTGO_API_URL
    - FLIGHTGO_API_USER
    - FLIGHTGO_API_PASS
    - DHL_API_KEY
    - DHL_API_SECRET

accessories:
  postgres:
    image: postgres:16-alpine
    host: YOUR_SERVER_IP
    port: 5432
    env:
      clear:
        POSTGRES_DB: flightgo_db
        POSTGRES_USER: flightgo
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - /var/lib/flightgo/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    host: YOUR_SERVER_IP
    port: 6379
    volumes:
      - /var/lib/flightgo/redis:/data

healthcheck:
  path: /api/health
  port: 3000
  interval: 10s
